schema_version: "1.0.0"
store_location: outside_repository
encrypted_store_required: true
plaintext_repository_store_forbidden: true
secrets:
  - {name: server.host, type: host, lifecycle_policy: long_lived, verification_owner: I-0007}
  - {name: server.port, type: port, lifecycle_policy: long_lived, verification_owner: I-0007}
  - {name: server.username, type: username, lifecycle_policy: long_lived, verification_owner: I-0007}
  - {name: server.password, type: password, lifecycle_policy: long_lived, verification_owner: I-0007}
  - {name: bailian.api_key, type: api_key, lifecycle_policy: long_lived, verification_owner: I-0013}
  - {name: langsmith.api_key, type: api_key, lifecycle_policy: long_lived, verification_owner: I-0014}
rotation_trigger: confirmed_compromise_or_operator_revocation
public_evidence:
  allowed: [schema_version, secret_name, secret_version, created_at, verification_status]
  forbidden: [value, suffix, reversible_hash, host, username, private_path]
