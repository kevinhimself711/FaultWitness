schema_version: "1.0.0"
store_location: outside_repository
encrypted_store_required: true
plaintext_repository_store_forbidden: true
secrets:
  - {name: server.host, type: host, rotation_required_in: I-0007}
  - {name: server.port, type: port, rotation_required_in: null}
  - {name: server.username, type: username, rotation_required_in: null}
  - {name: server.password, type: password, rotation_required_in: I-0007}
  - {name: bailian.api_key, type: api_key, rotation_required_in: I-0007}
  - {name: langsmith.api_key, type: api_key, rotation_required_in: I-0007}
public_evidence:
  allowed: [schema_version, secret_name, secret_version, created_at, verification_status]
  forbidden: [value, suffix, reversible_hash, host, username, private_path]
