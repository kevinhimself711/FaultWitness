schema_version: "1.0.0"
id: incident
owner_component: CMP-CONTROL-API
authoritative_store: STORE-INCIDENT-POSTGRES
initial_state: NEW
terminal_states: [RESOLVED, ESCALATED, CANCELLED]
states: [NEW, QUEUED, INVESTIGATING, WAITING_APPROVAL, EXECUTING, VERIFYING, ROLLING_BACK, RESOLVED, ESCALATED, CANCELLED]
transitions:
  - {id: TR-INCIDENT-CREATE, from: NEW, to: QUEUED, actor: CMP-CONTROL-API, guard: "authenticated tenant and valid IncidentSpec", preconditions: [tenant_from_oidc, idempotency_reserved, expected_state_version], command: CMD-CREATE-INCIDENT, event: EVT-INCIDENT-CREATED, automatic: false, failure_semantics: "Invalid identity is rejected before persistence; duplicate key returns the original Incident."}
  - {id: TR-INCIDENT-START, from: QUEUED, to: INVESTIGATING, actor: CMP-SCHEDULER, guard: "runtime task has a valid active attempt", preconditions: [matching_tenant, expected_state_version], command: CMD-START-INVESTIGATION, event: EVT-INVESTIGATION-STARTED, automatic: true, failure_semantics: "A stale or cross-tenant task event is rejected without changing Incident state."}
  - {id: TR-INCIDENT-DIAGNOSIS-ONLY, from: INVESTIGATING, to: RESOLVED, actor: CMP-AGENT-WORKER, guard: "diagnosis complete and mode is diagnosis_only", preconditions: [final_report_present, evidence_refs_complete, expected_state_version], command: CMD-RECORD-DIAGNOSIS, event: EVT-DIAGNOSIS-COMPLETED, automatic: false, failure_semantics: "Missing report or unsupported critical claim prevents resolution and requires more evidence or escalation."}
  - {id: TR-INCIDENT-R1-ACTION, from: INVESTIGATING, to: EXECUTING, actor: CMP-AGENT-WORKER, guard: "R1 action is currently allowed by policy", preconditions: [matching_tenant, valid_policy_decision, immutable_action_digest, expected_state_version], command: CMD-RECORD-ACTION-PROPOSAL, event: EVT-ACTION-REQUESTED, automatic: false, failure_semantics: "A missing or stale policy decision blocks execution and escalates safely."}
  - {id: TR-INCIDENT-R2-PROPOSAL, from: INVESTIGATING, to: WAITING_APPROVAL, actor: CMP-AGENT-WORKER, guard: "policy classifies proposal as R2", preconditions: [matching_tenant, immutable_action_digest, expected_state_version], command: CMD-RECORD-ACTION-PROPOSAL, event: EVT-ACTION-REQUESTED, automatic: false, failure_semantics: "The proposal is recorded but no write is dispatched before a matching approval."}
  - {id: TR-INCIDENT-INVESTIGATION-ESCALATE, from: INVESTIGATING, to: ESCALATED, actor: CMP-AGENT-WORKER, guard: "R3 forbidden or evidence budget deadline exhausted", preconditions: [typed_terminal_reason, final_report_present, expected_state_version], command: CMD-ESCALATE-INCIDENT, event: EVT-INCIDENT-ESCALATED, automatic: false, failure_semantics: "The Incident retains evidence and a typed reason instead of guessing or bypassing policy."}
  - {id: TR-INCIDENT-APPROVE, from: WAITING_APPROVAL, to: EXECUTING, actor: CMP-CONTROL-API, guard: "approval grant is valid and matches the current action digest", preconditions: [matching_tenant, valid_approval_digest, valid_resource_version, approval_not_expired, expected_state_version], command: CMD-RECORD-APPROVAL-DECISION, event: EVT-APPROVAL-RECORDED, automatic: false, failure_semantics: "Any digest scope version or expiry mismatch returns conflict and does not dispatch."}
  - {id: TR-INCIDENT-APPROVAL-REJECT, from: WAITING_APPROVAL, to: ESCALATED, actor: CMP-CONTROL-API, guard: "approver rejects the immutable proposal", preconditions: [matching_tenant, expected_state_version], command: CMD-RECORD-APPROVAL-DECISION, event: EVT-INCIDENT-ESCALATED, automatic: false, failure_semantics: "The rejected digest cannot be reused and no ActionTransaction executes."}
  - {id: TR-INCIDENT-APPROVAL-EXPIRE, from: WAITING_APPROVAL, to: ESCALATED, actor: CMP-CONTROL-API, guard: "approval deadline expires", preconditions: [expected_state_version], command: CMD-RECORD-APPROVAL-DECISION, event: EVT-INCIDENT-ESCALATED, automatic: true, failure_semantics: "Expiry closes the approval opportunity and requires a newly digested proposal."}
  - {id: TR-INCIDENT-ACTION-KNOWN, from: EXECUTING, to: VERIFYING, actor: CMP-ACTION-EXECUTOR, guard: "ActionResult has a known external effect", preconditions: [matching_action_digest, expected_state_version], command: CMD-RECORD-ACTION-RESULT, event: EVT-ACTION-RESULT-RECORDED, automatic: true, failure_semantics: "Only an attributable receipt advances verification; duplicates return the prior result."}
  - {id: TR-INCIDENT-ACTION-UNCERTAIN, from: EXECUTING, to: ESCALATED, actor: CMP-ACTION-EXECUTOR, guard: "ActionTransaction is UNCERTAIN or MANUAL", preconditions: [typed_terminal_reason, expected_state_version], command: CMD-ESCALATE-INCIDENT, event: EVT-INCIDENT-ESCALATED, automatic: true, failure_semantics: "Uncertain side effects prohibit automatic retry and require reconciliation or manual handling."}
  - {id: TR-INCIDENT-VERIFY-PASS, from: VERIFYING, to: RESOLVED, actor: CMP-AGENT-WORKER, guard: "postconditions pass and Final Report is complete", preconditions: [postcondition_evidence, final_report_present, expected_state_version], command: CMD-RECORD-OUTCOME-VERIFICATION, event: EVT-OUTCOME-VERIFIED, automatic: false, failure_semantics: "Resolution is rejected if evidence or postcondition proof is missing."}
  - {id: TR-INCIDENT-VERIFY-COMPENSATE, from: VERIFYING, to: ROLLING_BACK, actor: CMP-ACTION-EXECUTOR, guard: "postconditions fail and compensation is defined", preconditions: [compensation_digest, expected_state_version], command: CMD-RECORD-OUTCOME-VERIFICATION, event: EVT-COMPENSATION-REQUESTED, automatic: true, failure_semantics: "A failed postcondition cannot be reported as resolved while compensation is pending."}
  - {id: TR-INCIDENT-VERIFY-ESCALATE, from: VERIFYING, to: ESCALATED, actor: CMP-ACTION-EXECUTOR, guard: "failure is non-compensable or uncertain", preconditions: [typed_terminal_reason, expected_state_version], command: CMD-ESCALATE-INCIDENT, event: EVT-INCIDENT-ESCALATED, automatic: true, failure_semantics: "Non-compensable or unknown outcome is preserved for manual reconciliation."}
  - {id: TR-INCIDENT-ROLLBACK-PASS, from: ROLLING_BACK, to: RESOLVED, actor: CMP-ACTION-EXECUTOR, guard: "compensation is verified and system is healthy", preconditions: [compensation_evidence, final_report_present, expected_state_version], command: CMD-RECORD-COMPENSATION, event: EVT-COMPENSATION-RECORDED, automatic: false, failure_semantics: "Rollback is not treated as complete until its postcondition is verified."}
  - {id: TR-INCIDENT-ROLLBACK-UNCERTAIN, from: ROLLING_BACK, to: ESCALATED, actor: CMP-ACTION-EXECUTOR, guard: "compensation fails or remains uncertain", preconditions: [typed_terminal_reason, expected_state_version], command: CMD-ESCALATE-INCIDENT, event: EVT-INCIDENT-ESCALATED, automatic: false, failure_semantics: "Uncertain compensation remains visible and requires manual reconciliation."}
  - {id: TR-INCIDENT-CANCEL-NEW, from: NEW, to: CANCELLED, actor: CMP-CONTROL-API, guard: "cancel requested before queue commit", preconditions: [matching_tenant, expected_state_version], command: CMD-CANCEL-INCIDENT, event: EVT-INCIDENT-CANCELLED, automatic: false, failure_semantics: "Cancellation is idempotent and cannot cross tenant scope."}
  - {id: TR-INCIDENT-CANCEL-QUEUED, from: QUEUED, to: CANCELLED, actor: CMP-CONTROL-API, guard: "cancel requested before task start", preconditions: [matching_tenant, expected_state_version], command: CMD-CANCEL-INCIDENT, event: EVT-INCIDENT-CANCELLED, automatic: false, failure_semantics: "Scheduler cancellation is emitted transactionally with the Incident terminal state."}
  - {id: TR-INCIDENT-CANCEL-INVESTIGATING, from: INVESTIGATING, to: CANCELLED, actor: CMP-CONTROL-API, guard: "cancel reaches a safe checkpoint with no possible action effect", preconditions: [matching_tenant, safe_checkpoint, expected_state_version], command: CMD-CANCEL-INCIDENT, event: EVT-INCIDENT-CANCELLED, automatic: false, failure_semantics: "Possible external effects force verification or escalation instead of cancellation."}
  - {id: TR-INCIDENT-CANCEL-WAITING, from: WAITING_APPROVAL, to: CANCELLED, actor: CMP-CONTROL-API, guard: "cancel invalidates pending approval before dispatch", preconditions: [matching_tenant, action_not_dispatched, expected_state_version], command: CMD-CANCEL-INCIDENT, event: EVT-INCIDENT-CANCELLED, automatic: false, failure_semantics: "The approval digest becomes unusable when cancellation commits."}
  - {id: TR-INCIDENT-CANCEL-REQUESTED, from: EXECUTING, to: EXECUTING, actor: CMP-CONTROL-API, guard: "cancel requested after dispatch", preconditions: [matching_tenant, expected_state_version], command: CMD-CANCEL-INCIDENT, event: EVT-INCIDENT-CANCEL-REQUESTED, automatic: false, failure_semantics: "Cancellation records intent only; the action effect must reach a known safe point first."}
invariants:
  - "R2 execution requires an unexpired approval that matches tenant environment action digest and resource version."
  - "RESOLVED always has a Final Report and attributable postcondition or diagnosis-only evidence."
  - "UNCERTAIN or MANUAL ActionTransaction forces Incident escalation."
  - "Terminal Incident states never transition in place; later feedback appends events."
