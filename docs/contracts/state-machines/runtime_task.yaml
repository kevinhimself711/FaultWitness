schema_version: "1.0.0"
id: runtime_task
owner_component: CMP-SCHEDULER
authoritative_store: STORE-TASK-POSTGRES
initial_state: PENDING
terminal_states: [SUCCEEDED, FAILED, DEAD_LETTER, CANCELLED]
states: [PENDING, LEASED, RUNNING, PAUSED, RETRY_WAIT, CANCEL_REQUESTED, SUCCEEDED, FAILED, DEAD_LETTER, CANCELLED]
transitions:
  - {id: TR-TASK-LEASE, from: PENDING, to: LEASED, actor: CMP-SCHEDULER, guard: "quota capacity and deadline allow an attempt", preconditions: [matching_tenant, monotonic_fencing_token, expected_state_version], command: CMD-ACQUIRE-TASK-LEASE, event: EVT-TASK-LEASED, automatic: true, failure_semantics: "Quota or capacity denial leaves the task pending with explicit backpressure."}
  - {id: TR-TASK-START, from: LEASED, to: RUNNING, actor: CMP-AGENT-WORKER, guard: "worker presents the current lease before start deadline", preconditions: [valid_fencing_token, matching_attempt_id, expected_state_version], command: CMD-START-TASK-ATTEMPT, event: EVT-TASK-STARTED, automatic: false, failure_semantics: "A stale token is fenced and cannot start or commit work."}
  - {id: TR-TASK-LEASE-EXPIRE, from: LEASED, to: RETRY_WAIT, actor: CMP-SCHEDULER, guard: "lease expires before worker start", preconditions: [lease_expired, expected_state_version], command: CMD-RETRY-TASK, event: EVT-TASK-RETRY-SCHEDULED, automatic: true, failure_semantics: "The attempt is retained and a new fencing token is required for retry."}
  - {id: TR-TASK-SUCCEED, from: RUNNING, to: SUCCEEDED, actor: CMP-AGENT-WORKER, guard: "worker commits a valid terminal result", preconditions: [valid_fencing_token, matching_attempt_id, checkpoint_committed, expected_state_version], command: CMD-COMPLETE-TASK, event: EVT-TASK-SUCCEEDED, automatic: false, failure_semantics: "Lease loss or version conflict rejects the stale completion without overwriting state."}
  - {id: TR-TASK-PAUSE, from: RUNNING, to: PAUSED, actor: CMP-AGENT-WORKER, guard: "graph interrupt has a committed checkpoint", preconditions: [valid_fencing_token, checkpoint_committed, expected_state_version], command: CMD-PAUSE-TASK, event: EVT-TASK-PAUSED, automatic: false, failure_semantics: "A task never pauses before durable checkpoint and releases its worker lease."}
  - {id: TR-TASK-RESUME, from: PAUSED, to: PENDING, actor: CMP-SCHEDULER, guard: "resume command is authorized and deadline remains", preconditions: [matching_tenant, checkpoint_exists, expected_state_version], command: CMD-RESUME-TASK, event: EVT-TASK-RESUMED, automatic: false, failure_semantics: "Resume creates a new attempt and fencing token instead of reviving an old lease."}
  - {id: TR-TASK-RETRY, from: RUNNING, to: RETRY_WAIT, actor: CMP-SCHEDULER, guard: "retryable failure or lease loss is recorded", preconditions: [typed_retry_reason, expected_state_version], command: CMD-RETRY-TASK, event: EVT-TASK-RETRY-SCHEDULED, automatic: true, failure_semantics: "Partial work is recovered only from committed checkpoints under a new attempt."}
  - {id: TR-TASK-REQUEUE, from: RETRY_WAIT, to: PENDING, actor: CMP-SCHEDULER, guard: "bounded attempts remain and backoff elapsed", preconditions: [attempt_budget_remaining, deadline_remaining, expected_state_version], command: CMD-RETRY-TASK, event: EVT-TASK-REQUEUED, automatic: true, failure_semantics: "Retries stop when attempt or deadline budget is exhausted."}
  - {id: TR-TASK-DEAD-LETTER, from: RETRY_WAIT, to: DEAD_LETTER, actor: CMP-SCHEDULER, guard: "attempt budget or deadline exhausted", preconditions: [typed_terminal_reason, expected_state_version], command: CMD-FAIL-TASK, event: EVT-TASK-DEAD-LETTERED, automatic: true, failure_semantics: "Exhausted work remains inspectable with the last checkpoint and failure history."}
  - {id: TR-TASK-FAIL, from: RUNNING, to: FAILED, actor: CMP-AGENT-WORKER, guard: "failure is typed non-retryable", preconditions: [valid_fencing_token, typed_terminal_reason, expected_state_version], command: CMD-FAIL-TASK, event: EVT-TASK-FAILED, automatic: false, failure_semantics: "An untyped or stale failure cannot terminate the task."}
  - {id: TR-TASK-CANCEL-PENDING, from: PENDING, to: CANCEL_REQUESTED, actor: CMP-SCHEDULER, guard: "authorized cancellation requested", preconditions: [matching_tenant, expected_state_version], command: CMD-CANCEL-TASK, event: EVT-TASK-CANCEL-REQUESTED, automatic: false, failure_semantics: "Cancellation is idempotent and retained until a safe terminal acknowledgement."}
  - {id: TR-TASK-CANCEL-LEASED, from: LEASED, to: CANCEL_REQUESTED, actor: CMP-SCHEDULER, guard: "authorized cancellation invalidates current lease", preconditions: [matching_tenant, expected_state_version], command: CMD-CANCEL-TASK, event: EVT-TASK-CANCEL-REQUESTED, automatic: false, failure_semantics: "The fencing token is invalidated before cancellation completes."}
  - {id: TR-TASK-CANCEL-RUNNING, from: RUNNING, to: CANCEL_REQUESTED, actor: CMP-SCHEDULER, guard: "authorized cancellation reaches running attempt", preconditions: [matching_tenant, expected_state_version], command: CMD-CANCEL-TASK, event: EVT-TASK-CANCEL-REQUESTED, automatic: false, failure_semantics: "Worker checkpoints and stops at a safe point; action uncertainty is handled separately."}
  - {id: TR-TASK-CANCEL-PAUSED, from: PAUSED, to: CANCEL_REQUESTED, actor: CMP-SCHEDULER, guard: "authorized cancellation reaches paused task", preconditions: [matching_tenant, expected_state_version], command: CMD-CANCEL-TASK, event: EVT-TASK-CANCEL-REQUESTED, automatic: false, failure_semantics: "The retained checkpoint remains auditable after cancellation."}
  - {id: TR-TASK-CANCEL-RETRY, from: RETRY_WAIT, to: CANCEL_REQUESTED, actor: CMP-SCHEDULER, guard: "authorized cancellation arrives during backoff", preconditions: [matching_tenant, expected_state_version], command: CMD-CANCEL-TASK, event: EVT-TASK-CANCEL-REQUESTED, automatic: false, failure_semantics: "No further attempt is enqueued after cancellation commits."}
  - {id: TR-TASK-CANCEL-COMPLETE, from: CANCEL_REQUESTED, to: CANCELLED, actor: CMP-SCHEDULER, guard: "worker stopped or no active lease remains", preconditions: [no_valid_worker_lease, safe_checkpoint, expected_state_version], command: CMD-CANCEL-TASK, event: EVT-TASK-CANCELLED, automatic: true, failure_semantics: "A valid active worker or uncertain side effect blocks terminal cancellation."}
invariants:
  - "Delivery is at least once and every retry uses a new attempt_id under the stable task_id."
  - "Only the current fencing token can checkpoint complete fail pause or dispatch downstream work."
  - "PAUSED tasks do not retain a worker lease."
  - "No distributed exactly-once behavior is claimed."
