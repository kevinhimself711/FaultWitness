schema_version: "1.0.0"
id: action_transaction
owner_component: CMP-ACTION-EXECUTOR
authoritative_store: STORE-ACTION-POSTGRES
initial_state: PREPARED
terminal_states: [COMMITTED, REJECTED, EXPIRED, ROLLED_BACK, MANUAL, CANCELLED]
states: [PREPARED, APPROVAL_PENDING, APPROVED, EXECUTING, VERIFYING, COMPENSATING, UNCERTAIN, COMMITTED, REJECTED, EXPIRED, ROLLED_BACK, MANUAL, CANCELLED]
transitions:
  - {id: TR-ACTION-R1-AUTHORIZE, from: PREPARED, to: APPROVED, actor: CMP-POLICY-ENGINE, guard: "current policy authorizes R1 action", preconditions: [matching_tenant, valid_policy_decision, immutable_action_digest, valid_resource_version, idempotency_reserved], command: CMD-AUTHORIZE-ACTION, event: EVT-ACTION-AUTHORIZED, automatic: false, failure_semantics: "Stale policy resource or digest blocks authorization."}
  - {id: TR-ACTION-R2-WAIT, from: PREPARED, to: APPROVAL_PENDING, actor: CMP-POLICY-ENGINE, guard: "current policy classifies action as R2", preconditions: [matching_tenant, immutable_action_digest, valid_resource_version], command: CMD-AUTHORIZE-ACTION, event: EVT-APPROVAL-REQUESTED, automatic: false, failure_semantics: "No write credential or dispatch is available while approval is pending."}
  - {id: TR-ACTION-R3-REJECT, from: PREPARED, to: REJECTED, actor: CMP-POLICY-ENGINE, guard: "policy classifies action as R3 or denies scope", preconditions: [typed_terminal_reason, expected_state_version], command: CMD-AUTHORIZE-ACTION, event: EVT-ACTION-REJECTED, automatic: false, failure_semantics: "A prohibited proposal terminates without side effect."}
  - {id: TR-ACTION-APPROVE, from: APPROVAL_PENDING, to: APPROVED, actor: CMP-CONTROL-API, guard: "approval matches immutable digest and current resource", preconditions: [matching_tenant, valid_approval_digest, valid_resource_version, approval_not_expired, expected_state_version], command: CMD-ACTION-APPROVAL-DECISION, event: EVT-ACTION-AUTHORIZED, automatic: false, failure_semantics: "Any mismatch returns conflict and leaves the action unexecuted."}
  - {id: TR-ACTION-APPROVAL-REJECT, from: APPROVAL_PENDING, to: REJECTED, actor: CMP-CONTROL-API, guard: "authorized approver rejects proposal", preconditions: [matching_tenant, expected_state_version], command: CMD-ACTION-APPROVAL-DECISION, event: EVT-ACTION-REJECTED, automatic: false, failure_semantics: "The rejected single-use digest cannot later authorize dispatch."}
  - {id: TR-ACTION-APPROVAL-EXPIRE, from: APPROVAL_PENDING, to: EXPIRED, actor: CMP-ACTION-EXECUTOR, guard: "approval validity window expires", preconditions: [expected_state_version], command: CMD-ACTION-APPROVAL-DECISION, event: EVT-ACTION-EXPIRED, automatic: true, failure_semantics: "Expiry requires a new proposal digest and approval."}
  - {id: TR-ACTION-CANCEL-PENDING, from: APPROVAL_PENDING, to: CANCELLED, actor: CMP-CONTROL-API, guard: "cancel arrives before approval and dispatch", preconditions: [matching_tenant, action_not_dispatched, expected_state_version], command: CMD-CANCEL-ACTION, event: EVT-ACTION-CANCELLED, automatic: false, failure_semantics: "Cancellation invalidates any later approval for the digest."}
  - {id: TR-ACTION-DISPATCH, from: APPROVED, to: EXECUTING, actor: CMP-ACTION-EXECUTOR, guard: "all authorization bindings still match at dispatch", preconditions: [matching_tenant, valid_authorization, valid_approval_if_R2, valid_approval_digest, valid_resource_version, current_policy_allow, idempotency_reserved, expected_state_version], command: CMD-DISPATCH-ACTION, event: EVT-ACTION-DISPATCHED, automatic: false, failure_semantics: "Tenant policy digest version or idempotency conflict prevents SUT invocation."}
  - {id: TR-ACTION-CANCEL-APPROVED, from: APPROVED, to: CANCELLED, actor: CMP-CONTROL-API, guard: "cancel commits before dispatch", preconditions: [matching_tenant, action_not_dispatched, expected_state_version], command: CMD-CANCEL-ACTION, event: EVT-ACTION-CANCELLED, automatic: false, failure_semantics: "A dispatch racing after cancellation is rejected by state version."}
  - {id: TR-ACTION-RECEIPT, from: EXECUTING, to: VERIFYING, actor: CMP-ACTION-EXECUTOR, guard: "adapter returns an attributable known receipt", preconditions: [matching_action_digest, typed_action_receipt, expected_state_version], command: CMD-RECORD-ACTION-RECEIPT, event: EVT-ACTION-RECEIPT-RECORDED, automatic: true, failure_semantics: "Duplicate receipt returns the existing transaction result."}
  - {id: TR-ACTION-EFFECT-UNCERTAIN, from: EXECUTING, to: UNCERTAIN, actor: CMP-ACTION-EXECUTOR, guard: "response lost timeout or conflicting receipt leaves effect unknown", preconditions: [typed_uncertainty_reason, expected_state_version], command: CMD-RECORD-ACTION-RECEIPT, event: EVT-ACTION-UNCERTAIN, automatic: true, failure_semantics: "No automatic redispatch is allowed while external effect may exist."}
  - {id: TR-ACTION-VERIFY-PASS, from: VERIFYING, to: COMMITTED, actor: CMP-ACTION-EXECUTOR, guard: "all versioned postconditions pass", preconditions: [postcondition_evidence, matching_action_digest, expected_state_version], command: CMD-VERIFY-ACTION, event: EVT-ACTION-COMMITTED, automatic: false, failure_semantics: "COMMITTED is impossible without attributable postcondition evidence."}
  - {id: TR-ACTION-VERIFY-COMPENSATE, from: VERIFYING, to: COMPENSATING, actor: CMP-ACTION-EXECUTOR, guard: "postconditions fail and compensation is defined", preconditions: [compensation_digest, valid_resource_version, expected_state_version], command: CMD-COMPENSATE-ACTION, event: EVT-ACTION-COMPENSATION-STARTED, automatic: false, failure_semantics: "Failed verification cannot be hidden as successful commit."}
  - {id: TR-ACTION-VERIFY-MANUAL, from: VERIFYING, to: MANUAL, actor: CMP-ACTION-EXECUTOR, guard: "postcondition failure is non-compensable", preconditions: [typed_terminal_reason, expected_state_version], command: CMD-VERIFY-ACTION, event: EVT-ACTION-MANUAL, automatic: false, failure_semantics: "Non-compensable failure preserves evidence for manual recovery."}
  - {id: TR-ACTION-COMPENSATE-PASS, from: COMPENSATING, to: ROLLED_BACK, actor: CMP-ACTION-EXECUTOR, guard: "compensation postconditions pass", preconditions: [compensation_evidence, matching_action_digest, expected_state_version], command: CMD-COMPENSATE-ACTION, event: EVT-ACTION-ROLLED-BACK, automatic: false, failure_semantics: "ROLLED_BACK requires verified compensation evidence."}
  - {id: TR-ACTION-COMPENSATE-UNCERTAIN, from: COMPENSATING, to: UNCERTAIN, actor: CMP-ACTION-EXECUTOR, guard: "compensation response or effect is unknown", preconditions: [typed_uncertainty_reason, expected_state_version], command: CMD-COMPENSATE-ACTION, event: EVT-ACTION-UNCERTAIN, automatic: true, failure_semantics: "Unknown compensation cannot be retried blindly or declared rolled back."}
  - {id: TR-ACTION-COMPENSATE-MANUAL, from: COMPENSATING, to: MANUAL, actor: CMP-ACTION-EXECUTOR, guard: "compensation cannot execute safely", preconditions: [typed_terminal_reason, expected_state_version], command: CMD-COMPENSATE-ACTION, event: EVT-ACTION-MANUAL, automatic: false, failure_semantics: "Manual handling retains the original and compensation evidence."}
  - {id: TR-ACTION-RECONCILE, from: UNCERTAIN, to: VERIFYING, actor: CMP-ACTION-EXECUTOR, guard: "read-only reconciliation establishes a known effect", preconditions: [reconciliation_evidence, matching_action_digest, expected_state_version], command: CMD-RECONCILE-ACTION, event: EVT-ACTION-RECONCILED, automatic: false, failure_semantics: "Reconciliation reads external truth and never redispatches the action."}
  - {id: TR-ACTION-RECONCILE-MANUAL, from: UNCERTAIN, to: MANUAL, actor: CMP-ACTION-EXECUTOR, guard: "reconciliation deadline expires without known effect", preconditions: [typed_terminal_reason, expected_state_version], command: CMD-RECONCILE-ACTION, event: EVT-ACTION-MANUAL, automatic: false, failure_semantics: "Unresolved uncertainty terminates in manual handling, not success or retry."}
invariants:
  - "Action Digest binds tenant environment action parameters resource version preconditions postconditions compensation risk approver expiry and single-use token."
  - "Action Executor is the sole component with SUT write credentials and arbitrary shell or Kubernetes writes are prohibited."
  - "COMMITTED requires successful postcondition evidence and R2 dispatch requires a matching immutable approval."
  - "UNCERTAIN has no automatic outgoing transition and permits reconciliation or manual handling only."
