schema_version: "1.0.0"
id: agent_graph
owner_component: CMP-AGENT-WORKER
authoritative_store: STORE-CHECKPOINT-POSTGRES
initial_state: INTAKE
terminal_states: [FINALIZE, ESCALATE]
states: [INTAKE, SCOPE_AND_RISK, BUILD_INITIAL_PLAN, RETRIEVE_CONTEXT, COLLECT_EVIDENCE, NORMALIZE_EVIDENCE, GENERATE_HYPOTHESES, VERIFY_HYPOTHESES, PLAN_PROBES, COMPOSE_REPORT, PROPOSE_ACTION, POLICY_CHECK, AWAIT_APPROVAL, DISPATCH_ACTION, AWAIT_ACTION_RESULT, VERIFY_OUTCOME, REQUEST_COMPENSATION, FINALIZE, ESCALATE]
transitions:
  - {id: TR-GRAPH-INTAKE, from: INTAKE, to: SCOPE_AND_RISK, actor: CMP-AGENT-WORKER, guard: "IncidentSpec and TenantContext validate", preconditions: [valid_fencing_token, bounded_budget, checkpoint_committed], command: CMD-ADVANCE-AGENT-GRAPH, event: EVT-AGENT-STATE-CHANGED, automatic: true, failure_semantics: "Invalid intake terminates in escalation without invoking a model or tool."}
  - {id: TR-GRAPH-SCOPE, from: SCOPE_AND_RISK, to: BUILD_INITIAL_PLAN, actor: CMP-AGENT-WORKER, guard: "service scope risk and mode are explicit", preconditions: [valid_fencing_token, budget_remaining, checkpoint_committed], command: CMD-ADVANCE-AGENT-GRAPH, event: EVT-AGENT-STATE-CHANGED, automatic: true, failure_semantics: "Ambiguous or forbidden scope escalates rather than broadening access."}
  - {id: TR-GRAPH-PLAN, from: BUILD_INITIAL_PLAN, to: RETRIEVE_CONTEXT, actor: CMP-AGENT-WORKER, guard: "typed bounded plan validates", preconditions: [valid_fencing_token, no_private_reasoning, checkpoint_committed], command: CMD-ADVANCE-AGENT-GRAPH, event: EVT-AGENT-STATE-CHANGED, automatic: true, failure_semantics: "Invalid structured plan gets bounded repair then escalation."}
  - {id: TR-GRAPH-RETRIEVE, from: RETRIEVE_CONTEXT, to: COLLECT_EVIDENCE, actor: CMP-AGENT-WORKER, guard: "retrieval result is ACL filtered and provenance complete", preconditions: [matching_tenant, freshness_checked, budget_remaining, checkpoint_committed], command: CMD-ADVANCE-AGENT-GRAPH, event: EVT-AGENT-STATE-CHANGED, automatic: true, failure_semantics: "Missing knowledge is explicit and any dependent write is blocked."}
  - {id: TR-GRAPH-COLLECT, from: COLLECT_EVIDENCE, to: NORMALIZE_EVIDENCE, actor: CMP-AGENT-WORKER, guard: "bounded collectors have returned or timed out", preconditions: [valid_fencing_token, typed_tool_results, evidence_progress_checked, checkpoint_committed], command: CMD-ADVANCE-AGENT-GRAPH, event: EVT-AGENT-STATE-CHANGED, automatic: true, failure_semantics: "Collector errors remain typed evidence gaps and cannot be converted to facts."}
  - {id: TR-GRAPH-NORMALIZE, from: NORMALIZE_EVIDENCE, to: GENERATE_HYPOTHESES, actor: CMP-AGENT-WORKER, guard: "deterministic reducer validates evidence records", preconditions: [provenance_complete, conflicts_preserved, checkpoint_committed], command: CMD-ADVANCE-AGENT-GRAPH, event: EVT-AGENT-STATE-CHANGED, automatic: true, failure_semantics: "Schema conflicts or duplicates are quarantined and never silently merged."}
  - {id: TR-GRAPH-HYPOTHESES, from: GENERATE_HYPOTHESES, to: VERIFY_HYPOTHESES, actor: CMP-AGENT-WORKER, guard: "bounded hypotheses cite supporting and contradicting EvidenceRef", preconditions: [budget_remaining, no_private_reasoning, checkpoint_committed], command: CMD-ADVANCE-AGENT-GRAPH, event: EVT-AGENT-STATE-CHANGED, automatic: true, failure_semantics: "Unsupported hypotheses are rejected or marked uncertain before verification."}
  - {id: TR-GRAPH-PROBE, from: VERIFY_HYPOTHESES, to: PLAN_PROBES, actor: CMP-AGENT-WORKER, guard: "evidence insufficient and progress budget remains", preconditions: [budget_remaining, novel_probe_available, checkpoint_committed], command: CMD-PLAN-PROBES, event: EVT-AGENT-STATE-CHANGED, automatic: false, failure_semantics: "Repeated or non-informative probes consume no unbounded loop and trigger escalation."}
  - {id: TR-GRAPH-PROBE-COLLECT, from: PLAN_PROBES, to: COLLECT_EVIDENCE, actor: CMP-AGENT-WORKER, guard: "typed ProbePlan validates against tool scope", preconditions: [budget_remaining, tool_scope_allowed, checkpoint_committed], command: CMD-ADVANCE-AGENT-GRAPH, event: EVT-AGENT-STATE-CHANGED, automatic: true, failure_semantics: "A forbidden or invalid probe is rejected and cannot widen service scope."}
  - {id: TR-GRAPH-DIAGNOSIS, from: VERIFY_HYPOTHESES, to: COMPOSE_REPORT, actor: CMP-AGENT-WORKER, guard: "diagnosis complete and no action is selected", preconditions: [critical_claims_supported, checkpoint_committed], command: CMD-ADVANCE-AGENT-GRAPH, event: EVT-AGENT-STATE-CHANGED, automatic: false, failure_semantics: "Unsupported critical claims prevent report finalization."}
  - {id: TR-GRAPH-ACTIONABLE, from: VERIFY_HYPOTHESES, to: PROPOSE_ACTION, actor: CMP-AGENT-WORKER, guard: "actionable conclusion has sufficient evidence", preconditions: [critical_claims_supported, mode_allows_actions, checkpoint_committed], command: CMD-PROPOSE-ACTION, event: EVT-ACTION-PROPOSED, automatic: false, failure_semantics: "Diagnosis-only mode or weak evidence cannot create an executable proposal."}
  - {id: TR-GRAPH-VERIFY-ESCALATE, from: VERIFY_HYPOTHESES, to: ESCALATE, actor: CMP-AGENT-WORKER, guard: "cannot judge safely or budget deadline exhausted", preconditions: [typed_terminal_reason, checkpoint_committed], command: CMD-ESCALATE-AGENT-GRAPH, event: EVT-AGENT-ESCALATED, automatic: false, failure_semantics: "The graph terminates with evidence gaps and never fabricates certainty."}
  - {id: TR-GRAPH-REPORT, from: COMPOSE_REPORT, to: FINALIZE, actor: CMP-AGENT-WORKER, guard: "Final Report schema and EvidenceRef coverage pass", preconditions: [critical_claims_supported, no_private_reasoning, checkpoint_committed], command: CMD-ADVANCE-AGENT-GRAPH, event: EVT-AGENT-FINALIZED, automatic: false, failure_semantics: "A malformed or untraceable report is repaired within budget or escalated."}
  - {id: TR-GRAPH-POLICY-CHECK, from: PROPOSE_ACTION, to: POLICY_CHECK, actor: CMP-AGENT-WORKER, guard: "ActionProposal schema and immutable digest validate", preconditions: [matching_tenant, resource_version_captured, checkpoint_committed], command: CMD-REQUEST-POLICY-DECISION, event: EVT-POLICY-REQUESTED, automatic: true, failure_semantics: "A proposal cannot reach policy without canonical parameters and preconditions."}
  - {id: TR-GRAPH-R01-DISPATCH, from: POLICY_CHECK, to: DISPATCH_ACTION, actor: CMP-POLICY-ENGINE, guard: "current policy allows R0 or R1 action", preconditions: [valid_policy_decision, matching_tenant, immutable_action_digest, checkpoint_committed], command: CMD-ADVANCE-AGENT-GRAPH, event: EVT-POLICY-DECIDED, automatic: false, failure_semantics: "OPA outage or stale policy decision blocks dispatch."}
  - {id: TR-GRAPH-R2-WAIT, from: POLICY_CHECK, to: AWAIT_APPROVAL, actor: CMP-POLICY-ENGINE, guard: "current policy requires R2 approval", preconditions: [immutable_action_digest, checkpoint_committed], command: CMD-ADVANCE-AGENT-GRAPH, event: EVT-APPROVAL-REQUESTED, automatic: false, failure_semantics: "The graph checkpoints and interrupts before any non-idempotent effect."}
  - {id: TR-GRAPH-R3-ESCALATE, from: POLICY_CHECK, to: ESCALATE, actor: CMP-POLICY-ENGINE, guard: "policy denies R3 or cannot decide", preconditions: [typed_terminal_reason, checkpoint_committed], command: CMD-ESCALATE-AGENT-GRAPH, event: EVT-AGENT-ESCALATED, automatic: false, failure_semantics: "Policy denial and outage fail closed without an execution path."}
  - {id: TR-GRAPH-APPROVED, from: AWAIT_APPROVAL, to: DISPATCH_ACTION, actor: CMP-CONTROL-API, guard: "unexpired approval matches the current immutable digest", preconditions: [valid_approval_digest, valid_resource_version, matching_tenant, checkpoint_committed], command: CMD-RESUME-AGENT-AFTER-APPROVAL, event: EVT-APPROVAL-RECORDED, automatic: false, failure_semantics: "Digest version tenant or expiry mismatch cannot resume dispatch."}
  - {id: TR-GRAPH-APPROVAL-END, from: AWAIT_APPROVAL, to: ESCALATE, actor: CMP-CONTROL-API, guard: "approval rejected expired or cancelled", preconditions: [typed_terminal_reason, checkpoint_committed], command: CMD-ESCALATE-AGENT-GRAPH, event: EVT-AGENT-ESCALATED, automatic: false, failure_semantics: "A rejected or expired digest is terminal for the proposal."}
  - {id: TR-GRAPH-DISPATCH, from: DISPATCH_ACTION, to: AWAIT_ACTION_RESULT, actor: CMP-AGENT-WORKER, guard: "typed authorized action command accepted by Action Executor", preconditions: [valid_fencing_token, immutable_action_digest, idempotency_reserved, checkpoint_committed], command: CMD-DISPATCH-ACTION-PROPOSAL, event: EVT-ACTION-DISPATCH-REQUESTED, automatic: false, failure_semantics: "Worker emits a command only; it never receives or uses SUT write credentials."}
  - {id: TR-GRAPH-ACTION-KNOWN, from: AWAIT_ACTION_RESULT, to: VERIFY_OUTCOME, actor: CMP-ACTION-EXECUTOR, guard: "ActionResult has a known attributable effect", preconditions: [matching_action_digest, checkpoint_committed], command: CMD-ADVANCE-AGENT-GRAPH, event: EVT-ACTION-RESULT-RECORDED, automatic: true, failure_semantics: "Duplicate results are deduplicated and conflicting receipts escalate."}
  - {id: TR-GRAPH-ACTION-UNCERTAIN, from: AWAIT_ACTION_RESULT, to: ESCALATE, actor: CMP-ACTION-EXECUTOR, guard: "ActionTransaction is UNCERTAIN or MANUAL", preconditions: [typed_terminal_reason, checkpoint_committed], command: CMD-ESCALATE-AGENT-GRAPH, event: EVT-AGENT-ESCALATED, automatic: true, failure_semantics: "The graph cannot blind-retry or treat uncertainty as success."}
  - {id: TR-GRAPH-OUTCOME-PASS, from: VERIFY_OUTCOME, to: FINALIZE, actor: CMP-AGENT-WORKER, guard: "postconditions pass and report is complete", preconditions: [postcondition_evidence, critical_claims_supported, checkpoint_committed], command: CMD-ADVANCE-AGENT-GRAPH, event: EVT-AGENT-FINALIZED, automatic: false, failure_semantics: "Finalization is blocked if the external postcondition is absent."}
  - {id: TR-GRAPH-OUTCOME-COMPENSATE, from: VERIFY_OUTCOME, to: REQUEST_COMPENSATION, actor: CMP-AGENT-WORKER, guard: "postconditions fail and typed compensation exists", preconditions: [compensation_digest, checkpoint_committed], command: CMD-REQUEST-COMPENSATION, event: EVT-COMPENSATION-REQUESTED, automatic: false, failure_semantics: "The graph only requests compensation; Action Executor remains the sole writer."}
  - {id: TR-GRAPH-OUTCOME-ESCALATE, from: VERIFY_OUTCOME, to: ESCALATE, actor: CMP-AGENT-WORKER, guard: "outcome is non-compensable or uncertain", preconditions: [typed_terminal_reason, checkpoint_committed], command: CMD-ESCALATE-AGENT-GRAPH, event: EVT-AGENT-ESCALATED, automatic: false, failure_semantics: "Unsafe outcome terminates the graph for manual handling."}
  - {id: TR-GRAPH-COMPENSATION-WAIT, from: REQUEST_COMPENSATION, to: AWAIT_ACTION_RESULT, actor: CMP-ACTION-EXECUTOR, guard: "compensation command accepted with matching digest", preconditions: [valid_fencing_token, compensation_digest, checkpoint_committed], command: CMD-ADVANCE-AGENT-GRAPH, event: EVT-ACTION-DISPATCH-REQUESTED, automatic: true, failure_semantics: "Compensation execution remains in Action Executor and duplicate requests are idempotent."}
invariants:
  - "The graph emits ToolCall and ActionProposal only and has no shell Kubernetes or direct SUT write capability."
  - "LLM decision nodes are separated from deterministic policy execution reducers and state commits."
  - "Every important transition checkpoints step tool token cost deadline and no-progress budgets."
  - "Private chain-of-thought is never persisted; public rationale is structured and evidence linked."
