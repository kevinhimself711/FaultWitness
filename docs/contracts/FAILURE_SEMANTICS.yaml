schema_version: "1.0.0"
errors:
  - {id: ERR-INVALID-REQUEST, http_status: 400, retryable: false, meaning: "Typed request or structured payload is invalid and must be corrected."}
  - {id: ERR-UNAUTHENTICATED, http_status: 401, retryable: false, meaning: "OIDC identity is missing invalid expired or unavailable."}
  - {id: ERR-FORBIDDEN, http_status: 403, retryable: false, meaning: "Authenticated identity lacks tenant scope policy or data authority."}
  - {id: ERR-NOT-FOUND, http_status: 404, retryable: false, meaning: "Tenant-scoped resource does not exist or is intentionally concealed."}
  - {id: ERR-CONFLICT, http_status: 409, retryable: false, meaning: "Idempotency digest resource version or expected state version conflicts."}
  - {id: ERR-UNCERTAIN, http_status: 409, retryable: false, meaning: "External effect is unknown and requires reconciliation rather than retry."}
  - {id: ERR-QUOTA, http_status: 429, retryable: true, meaning: "Tenant quota concurrency or backpressure currently rejects new work."}
  - {id: ERR-DEPENDENCY-UNAVAILABLE, http_status: 503, retryable: true, meaning: "A required dependency is unavailable under its fixed degradation policy."}
  - {id: ERR-STALE-LEASE, http_status: 409, retryable: false, meaning: "Worker fencing token or attempt no longer owns commit authority."}
  - {id: ERR-RETRY-EXHAUSTED, http_status: 409, retryable: false, meaning: "Attempt deadline or retry budget is exhausted and work cannot requeue."}
failures:
  - {id: FAIL-OIDC-TENANT-INVALID, fault: "OIDC or TenantContext is invalid", detection: "token signature audience expiry and tenant claim validation", behavior: "Reject before Incident creation and ignore all user supplied identity fields.", state_effect: "No state or outbox commit", retry_policy: none, client_error: ERR-UNAUTHENTICATED, gates: [G01, G06]}
  - {id: FAIL-DUPLICATE-CREATE, fault: "Incident create command is duplicated", detection: "same tenant and Idempotency-Key reaches Control API", behavior: "Return the original compatible Incident result without creating another task.", state_effect: "Existing state returned unchanged", retry_policy: none, client_error: ERR-CONFLICT, gates: [G01]}
  - {id: FAIL-DATABASE-TRANSACTION, fault: "Owner database transaction fails", detection: "transaction commit raises or loses database connection", behavior: "Commit neither owned state nor transactional outbox and surface dependency failure.", state_effect: "No partial commit", retry_policy: bounded, client_error: ERR-DEPENDENCY-UNAVAILABLE, gates: [G01, G06]}
  - {id: FAIL-OUTBOX-PUBLISH, fault: "Outbox publication fails after state commit", detection: "publisher lacks broker acknowledgement", behavior: "Retain the outbox row and publish until acknowledged while consumers deduplicate event_id.", state_effect: "Owned state remains committed and event pending", retry_policy: publish_until_ack, client_error: ERR-DEPENDENCY-UNAVAILABLE, gates: [G01, G06]}
  - {id: FAIL-WORKER-LEASE-LOSS, fault: "Worker loses lease before commit", detection: "fencing token no longer matches Scheduler state", behavior: "Reject stale commit and recover a new attempt from the last durable checkpoint.", state_effect: "RUNNING to RETRY_WAIT under Scheduler", retry_policy: bounded, client_error: ERR-STALE-LEASE, gates: [G01, G06]}
  - {id: FAIL-MODEL-TOOL-TRANSIENT, fault: "Model or read tool returns timeout rate limit or transient 5xx", detection: "typed gateway error classification", behavior: "Apply bounded retry budget then degrade explicitly or escalate with the failure record.", state_effect: "Graph continues degraded or reaches ESCALATE", retry_policy: bounded, client_error: ERR-DEPENDENCY-UNAVAILABLE, gates: [G03, G07]}
  - {id: FAIL-STRUCTURED-OUTPUT, fault: "Model structured output fails schema", detection: "strict output schema validation", behavior: "Attempt bounded repair and escalate when repair budget is exhausted.", state_effect: "Graph remains bounded or reaches ESCALATE", retry_policy: bounded, client_error: ERR-INVALID-REQUEST, gates: [G01, G03]}
  - {id: FAIL-QDRANT-UNAVAILABLE, fault: "Knowledge index is unavailable", detection: "Knowledge Service dependency health and typed query failure", behavior: "Mark knowledge missing and block any write whose safety depends on that context.", state_effect: "Read degrades and action path fails closed", retry_policy: bounded, client_error: ERR-DEPENDENCY-UNAVAILABLE, gates: [G04, G05]}
  - {id: FAIL-MINIO-UNAVAILABLE, fault: "Artifact store is unavailable", detection: "Artifact write or read returns typed dependency failure", behavior: "Pause large-result flow and never substitute an unbounded payload in Agent context.", state_effect: "Task pauses retries or escalates", retry_policy: bounded, client_error: ERR-DEPENDENCY-UNAVAILABLE, gates: [G04, G07]}
  - {id: FAIL-LANGSMITH-UNAVAILABLE, fault: "Authoritative Trace or Eval service is unavailable", detection: "instrumentation export and health confirmation fail", behavior: "Buffer bounded sanitized events allow qualified reads only fail writes closed and forbid Gate closure.", state_effect: "Write path blocked and Eval remains incomplete", retry_policy: bounded, client_error: ERR-DEPENDENCY-UNAVAILABLE, gates: [G01, G07, G10]}
  - {id: FAIL-OPA-UNAVAILABLE, fault: "Policy engine is unavailable", detection: "policy request timeout or health failure", behavior: "Deny all write actions without a fallback allow decision.", state_effect: "Action stays PREPARED or graph ESCALATE", retry_policy: bounded, client_error: ERR-DEPENDENCY-UNAVAILABLE, gates: [G01, G05]}
  - {id: FAIL-KEYCLOAK-UNAVAILABLE, fault: "Identity provider is unavailable", detection: "token validation or identity health cannot complete", behavior: "Reject new requests and approvals while an existing read-only run may finish on a valid snapshot.", state_effect: "No new state or approval commit", retry_policy: bounded, client_error: ERR-DEPENDENCY-UNAVAILABLE, gates: [G01, G06]}
  - {id: FAIL-ACTION-RESPONSE-LOST, fault: "Action may execute but its response is lost", detection: "adapter timeout after dispatch without attributable receipt", behavior: "Enter UNCERTAIN and reconcile external truth before any further action.", state_effect: "EXECUTING to UNCERTAIN", retry_policy: reconcile_only, client_error: ERR-UNCERTAIN, gates: [G05]}
  - {id: FAIL-POSTCONDITION, fault: "Typed action completes but postconditions fail", detection: "versioned postcondition evaluator returns failure", behavior: "Run defined compensation or enter MANUAL and escalate when not compensable.", state_effect: "VERIFYING to COMPENSATING or MANUAL", retry_policy: none, client_error: ERR-CONFLICT, gates: [G05]}
  - {id: FAIL-COMPENSATION-UNKNOWN, fault: "Compensation effect cannot be established", detection: "lost response or inconclusive reconciliation", behavior: "Preserve UNCERTAIN then require manual reconciliation without blind retry.", state_effect: "COMPENSATING to UNCERTAIN to MANUAL", retry_policy: manual_only, client_error: ERR-UNCERTAIN, gates: [G05]}
  - {id: FAIL-CANCEL, fault: "Cancellation arrives before or during work", detection: "authorized idempotent cancel command", behavior: "Apply at a safe checkpoint and verify or escalate any possible external side effect.", state_effect: "Cancel request then CANCELLED or ESCALATED", retry_policy: none, client_error: ERR-CONFLICT, gates: [G03, G05, G06]}
  - {id: FAIL-GROUND-TRUTH-ACCESS, fault: "Agent Runtime or developer requests locked Ground Truth", detection: "sealed identity storage and network policy denial", behavior: "Deny access emit security audit and invalidate contaminated evaluation or training runs.", state_effect: "No Agent state receives protected data", retry_policy: none, client_error: ERR-FORBIDDEN, gates: [G02, G07, G09]}
