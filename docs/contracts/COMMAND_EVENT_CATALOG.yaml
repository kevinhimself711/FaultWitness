schema_version: "1.0.0"
commands:
  - {id: CMD-CREATE-INCIDENT, sender: authenticated edge, owner: CMP-CONTROL-API, purpose: "Create or return an idempotent tenant-scoped Incident.", idempotency: required, version_check: state_version, errors: [ERR-UNAUTHENTICATED, ERR-CONFLICT, ERR-QUOTA, ERR-INVALID-REQUEST]}
  - {id: CMD-START-INVESTIGATION, sender: Scheduler event consumer, owner: CMP-CONTROL-API, purpose: "Record a valid Runtime Task attempt starting investigation.", idempotency: derived, version_check: state_version, errors: [ERR-CONFLICT, ERR-FORBIDDEN]}
  - {id: CMD-RECORD-DIAGNOSIS, sender: Agent Worker, owner: CMP-CONTROL-API, purpose: "Record an evidence-linked diagnosis and Final Report.", idempotency: required, version_check: state_version, errors: [ERR-CONFLICT, ERR-INVALID-REQUEST]}
  - {id: CMD-RECORD-ACTION-PROPOSAL, sender: Agent Worker, owner: CMP-CONTROL-API, purpose: "Record a canonical ActionProposal and its immutable digest.", idempotency: required, version_check: state_version, errors: [ERR-CONFLICT, ERR-FORBIDDEN, ERR-INVALID-REQUEST]}
  - {id: CMD-RECORD-APPROVAL-DECISION, sender: authenticated approver, owner: CMP-CONTROL-API, purpose: "Record approve reject or expiry against the exact pending digest.", idempotency: required, version_check: digest_and_state_version, errors: [ERR-UNAUTHENTICATED, ERR-FORBIDDEN, ERR-CONFLICT]}
  - {id: CMD-RECORD-ACTION-RESULT, sender: Action Executor, owner: CMP-CONTROL-API, purpose: "Project a typed known or uncertain action result into Incident state.", idempotency: derived, version_check: state_version, errors: [ERR-CONFLICT, ERR-UNCERTAIN]}
  - {id: CMD-RECORD-OUTCOME-VERIFICATION, sender: Agent Worker or Action Executor, owner: CMP-CONTROL-API, purpose: "Record postcondition evidence and select resolve compensate or escalate.", idempotency: required, version_check: state_version, errors: [ERR-CONFLICT, ERR-INVALID-REQUEST]}
  - {id: CMD-RECORD-COMPENSATION, sender: Action Executor, owner: CMP-CONTROL-API, purpose: "Record verified compensation or an uncertain rollback outcome.", idempotency: derived, version_check: state_version, errors: [ERR-CONFLICT, ERR-UNCERTAIN]}
  - {id: CMD-CANCEL-INCIDENT, sender: authenticated operator, owner: CMP-CONTROL-API, purpose: "Request tenant-scoped Incident cancellation at a safe point.", idempotency: required, version_check: state_version, errors: [ERR-UNAUTHENTICATED, ERR-FORBIDDEN, ERR-CONFLICT]}
  - {id: CMD-ESCALATE-INCIDENT, sender: system component, owner: CMP-CONTROL-API, purpose: "Terminate an Incident with a typed reason and retained evidence.", idempotency: derived, version_check: state_version, errors: [ERR-CONFLICT, ERR-INVALID-REQUEST]}
  - {id: CMD-ACQUIRE-TASK-LEASE, sender: Scheduler loop, owner: CMP-SCHEDULER, purpose: "Lease a pending task with a new attempt and monotonic fencing token.", idempotency: derived, version_check: state_version, errors: [ERR-CONFLICT, ERR-QUOTA]}
  - {id: CMD-START-TASK-ATTEMPT, sender: Agent Worker, owner: CMP-SCHEDULER, purpose: "Start work under the current task lease and fencing token.", idempotency: required, version_check: fencing_token, errors: [ERR-STALE-LEASE, ERR-CONFLICT]}
  - {id: CMD-COMPLETE-TASK, sender: Agent Worker, owner: CMP-SCHEDULER, purpose: "Commit a terminal task result from a valid fenced attempt.", idempotency: required, version_check: fencing_token, errors: [ERR-STALE-LEASE, ERR-CONFLICT]}
  - {id: CMD-PAUSE-TASK, sender: Agent Worker, owner: CMP-SCHEDULER, purpose: "Pause after durable graph interrupt checkpoint and release the lease.", idempotency: required, version_check: fencing_token, errors: [ERR-STALE-LEASE, ERR-CONFLICT]}
  - {id: CMD-RESUME-TASK, sender: Control API, owner: CMP-SCHEDULER, purpose: "Requeue a paused task as a new attempt from its checkpoint.", idempotency: required, version_check: state_version, errors: [ERR-CONFLICT, ERR-FORBIDDEN]}
  - {id: CMD-RETRY-TASK, sender: Scheduler loop, owner: CMP-SCHEDULER, purpose: "Schedule bounded backoff or requeue while attempt budget remains.", idempotency: derived, version_check: state_version, errors: [ERR-CONFLICT, ERR-RETRY-EXHAUSTED]}
  - {id: CMD-FAIL-TASK, sender: Agent Worker or Scheduler, owner: CMP-SCHEDULER, purpose: "Record a typed non-retryable or exhausted terminal task failure.", idempotency: required, version_check: fencing_token, errors: [ERR-STALE-LEASE, ERR-CONFLICT]}
  - {id: CMD-CANCEL-TASK, sender: Control API, owner: CMP-SCHEDULER, purpose: "Request and complete task cancellation after a safe checkpoint.", idempotency: required, version_check: state_version, errors: [ERR-CONFLICT, ERR-FORBIDDEN]}
  - {id: CMD-ADVANCE-AGENT-GRAPH, sender: Agent Worker node, owner: CMP-AGENT-WORKER, purpose: "Apply a typed guarded graph transition and durable checkpoint.", idempotency: derived, version_check: fencing_token, errors: [ERR-STALE-LEASE, ERR-CONFLICT, ERR-INVALID-REQUEST]}
  - {id: CMD-PLAN-PROBES, sender: Agent Worker verifier, owner: CMP-AGENT-WORKER, purpose: "Create bounded novel probes when evidence remains insufficient.", idempotency: required, version_check: fencing_token, errors: [ERR-STALE-LEASE, ERR-QUOTA, ERR-FORBIDDEN]}
  - {id: CMD-PROPOSE-ACTION, sender: Agent Worker verifier, owner: CMP-AGENT-WORKER, purpose: "Create a typed evidence-linked ActionProposal without executing it.", idempotency: required, version_check: fencing_token, errors: [ERR-STALE-LEASE, ERR-FORBIDDEN, ERR-INVALID-REQUEST]}
  - {id: CMD-REQUEST-POLICY-DECISION, sender: Agent Worker, owner: CMP-POLICY-ENGINE, purpose: "Request risk scope and obligation evaluation for a canonical proposal.", idempotency: required, version_check: digest_and_state_version, errors: [ERR-FORBIDDEN, ERR-DEPENDENCY-UNAVAILABLE]}
  - {id: CMD-RESUME-AGENT-AFTER-APPROVAL, sender: Control API, owner: CMP-AGENT-WORKER, purpose: "Resume an interrupted graph with a matching immutable approval grant.", idempotency: required, version_check: digest_and_state_version, errors: [ERR-STALE-LEASE, ERR-CONFLICT, ERR-FORBIDDEN]}
  - {id: CMD-DISPATCH-ACTION-PROPOSAL, sender: Agent Worker, owner: CMP-ACTION-EXECUTOR, purpose: "Submit an authorized proposal to the sole privileged executor.", idempotency: required, version_check: digest_and_state_version, errors: [ERR-STALE-LEASE, ERR-CONFLICT, ERR-FORBIDDEN]}
  - {id: CMD-REQUEST-COMPENSATION, sender: Agent Worker, owner: CMP-ACTION-EXECUTOR, purpose: "Request typed compensation for a verified failed postcondition.", idempotency: required, version_check: digest_and_state_version, errors: [ERR-CONFLICT, ERR-FORBIDDEN, ERR-UNCERTAIN]}
  - {id: CMD-ESCALATE-AGENT-GRAPH, sender: Agent Worker node, owner: CMP-AGENT-WORKER, purpose: "Terminate the graph with a typed safe escalation reason.", idempotency: derived, version_check: fencing_token, errors: [ERR-STALE-LEASE, ERR-CONFLICT]}
  - {id: CMD-AUTHORIZE-ACTION, sender: Policy Engine, owner: CMP-ACTION-EXECUTOR, purpose: "Record R1 authorization R2 approval requirement or R3 rejection.", idempotency: derived, version_check: digest_and_state_version, errors: [ERR-CONFLICT, ERR-FORBIDDEN, ERR-DEPENDENCY-UNAVAILABLE]}
  - {id: CMD-ACTION-APPROVAL-DECISION, sender: Control API, owner: CMP-ACTION-EXECUTOR, purpose: "Apply approve reject expiry or cancel to the pending ActionTransaction.", idempotency: required, version_check: digest_and_state_version, errors: [ERR-CONFLICT, ERR-FORBIDDEN]}
  - {id: CMD-DISPATCH-ACTION, sender: Action Executor coordinator, owner: CMP-ACTION-EXECUTOR, purpose: "Dispatch one typed authorized action after all bindings revalidate.", idempotency: required, version_check: digest_and_state_version, errors: [ERR-CONFLICT, ERR-FORBIDDEN, ERR-DEPENDENCY-UNAVAILABLE]}
  - {id: CMD-RECORD-ACTION-RECEIPT, sender: typed SUT adapter, owner: CMP-ACTION-EXECUTOR, purpose: "Record a known receipt or explicit uncertain effect without blind retry.", idempotency: derived, version_check: state_version, errors: [ERR-CONFLICT, ERR-UNCERTAIN]}
  - {id: CMD-VERIFY-ACTION, sender: Action Executor verifier, owner: CMP-ACTION-EXECUTOR, purpose: "Evaluate versioned external postconditions and persist evidence.", idempotency: required, version_check: state_version, errors: [ERR-CONFLICT, ERR-DEPENDENCY-UNAVAILABLE]}
  - {id: CMD-COMPENSATE-ACTION, sender: Action Executor verifier, owner: CMP-ACTION-EXECUTOR, purpose: "Execute and verify the typed compensation bound to the digest.", idempotency: required, version_check: digest_and_state_version, errors: [ERR-CONFLICT, ERR-UNCERTAIN, ERR-DEPENDENCY-UNAVAILABLE]}
  - {id: CMD-RECONCILE-ACTION, sender: Action Executor reconciler, owner: CMP-ACTION-EXECUTOR, purpose: "Read external truth to resolve uncertainty without redispatch.", idempotency: required, version_check: state_version, errors: [ERR-CONFLICT, ERR-UNCERTAIN, ERR-DEPENDENCY-UNAVAILABLE]}
  - {id: CMD-CANCEL-ACTION, sender: Control API, owner: CMP-ACTION-EXECUTOR, purpose: "Cancel an action only before dispatch and invalidate its approval.", idempotency: required, version_check: digest_and_state_version, errors: [ERR-CONFLICT, ERR-FORBIDDEN]}
events:
  - {id: EVT-INCIDENT-CREATED, producer: CMP-CONTROL-API, purpose: "Announce durable tenant-scoped Incident creation.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-INVESTIGATION-STARTED, producer: CMP-CONTROL-API, purpose: "Announce that a valid Runtime attempt started investigation.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-DIAGNOSIS-COMPLETED, producer: CMP-CONTROL-API, purpose: "Publish an evidence-linked diagnosis-only terminal result.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-ACTION-REQUESTED, producer: CMP-CONTROL-API, purpose: "Publish an Incident action proposal and immutable digest.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-APPROVAL-RECORDED, producer: CMP-CONTROL-API, purpose: "Publish a tenant-scoped decision for an exact action digest.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-ACTION-RESULT-RECORDED, producer: CMP-ACTION-EXECUTOR, purpose: "Publish a known or uncertain ActionTransaction result.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-OUTCOME-VERIFIED, producer: CMP-CONTROL-API, purpose: "Publish attributable Incident postcondition verification.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-COMPENSATION-REQUESTED, producer: CMP-AGENT-WORKER, purpose: "Request compensation for a verified failed outcome.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-COMPENSATION-RECORDED, producer: CMP-ACTION-EXECUTOR, purpose: "Publish verified or uncertain compensation outcome.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-INCIDENT-CANCEL-REQUESTED, producer: CMP-CONTROL-API, purpose: "Announce cancellation intent pending a safe checkpoint.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-INCIDENT-CANCELLED, producer: CMP-CONTROL-API, purpose: "Announce terminal Incident cancellation without uncertain effects.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-INCIDENT-ESCALATED, producer: CMP-CONTROL-API, purpose: "Publish terminal escalation with typed reason and evidence.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-TASK-LEASED, producer: CMP-SCHEDULER, purpose: "Publish a new attempt lease and fencing token metadata.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-TASK-STARTED, producer: CMP-SCHEDULER, purpose: "Publish valid task attempt start.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-TASK-RETRY-SCHEDULED, producer: CMP-SCHEDULER, purpose: "Publish typed retry reason and bounded backoff.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-TASK-REQUEUED, producer: CMP-SCHEDULER, purpose: "Publish task return to pending for a new attempt.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-TASK-SUCCEEDED, producer: CMP-SCHEDULER, purpose: "Publish fenced terminal task success.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-TASK-PAUSED, producer: CMP-SCHEDULER, purpose: "Publish durable paused checkpoint and lease release.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-TASK-RESUMED, producer: CMP-SCHEDULER, purpose: "Publish authorized resume into a new attempt.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-TASK-DEAD-LETTERED, producer: CMP-SCHEDULER, purpose: "Publish exhausted retry terminal state and history.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-TASK-FAILED, producer: CMP-SCHEDULER, purpose: "Publish typed non-retryable terminal failure.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-TASK-CANCEL-REQUESTED, producer: CMP-SCHEDULER, purpose: "Publish task cancellation intent and token invalidation.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-TASK-CANCELLED, producer: CMP-SCHEDULER, purpose: "Publish safe terminal task cancellation.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-AGENT-STATE-CHANGED, producer: CMP-AGENT-WORKER, purpose: "Publish a versioned durable graph transition.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-ACTION-PROPOSED, producer: CMP-AGENT-WORKER, purpose: "Publish typed ActionProposal creation without execution.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-POLICY-REQUESTED, producer: CMP-AGENT-WORKER, purpose: "Publish a canonical policy decision request.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-POLICY-DECIDED, producer: CMP-POLICY-ENGINE, purpose: "Publish versioned risk scope and obligations.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-APPROVAL-REQUESTED, producer: CMP-ACTION-EXECUTOR, purpose: "Publish an immutable R2 approval request.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-ACTION-DISPATCH-REQUESTED, producer: CMP-AGENT-WORKER, purpose: "Publish authorized request to the sole Action Executor.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-AGENT-FINALIZED, producer: CMP-AGENT-WORKER, purpose: "Publish completed graph report and evidence lineage.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-AGENT-ESCALATED, producer: CMP-AGENT-WORKER, purpose: "Publish typed graph escalation and remaining uncertainty.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-ACTION-AUTHORIZED, producer: CMP-ACTION-EXECUTOR, purpose: "Publish policy or approval authorization bound to a digest.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-ACTION-REJECTED, producer: CMP-ACTION-EXECUTOR, purpose: "Publish terminal policy or approver rejection.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-ACTION-EXPIRED, producer: CMP-ACTION-EXECUTOR, purpose: "Publish terminal approval expiry.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-ACTION-CANCELLED, producer: CMP-ACTION-EXECUTOR, purpose: "Publish terminal pre-dispatch cancellation.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-ACTION-DISPATCHED, producer: CMP-ACTION-EXECUTOR, purpose: "Publish attributable typed SUT dispatch.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-ACTION-RECEIPT-RECORDED, producer: CMP-ACTION-EXECUTOR, purpose: "Publish known typed external action receipt.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-ACTION-UNCERTAIN, producer: CMP-ACTION-EXECUTOR, purpose: "Publish explicit unknown external or compensation effect.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-ACTION-COMMITTED, producer: CMP-ACTION-EXECUTOR, purpose: "Publish verified successful action postconditions.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-ACTION-COMPENSATION-STARTED, producer: CMP-ACTION-EXECUTOR, purpose: "Publish typed compensation dispatch start.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-ACTION-ROLLED-BACK, producer: CMP-ACTION-EXECUTOR, purpose: "Publish verified successful compensation.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-ACTION-MANUAL, producer: CMP-ACTION-EXECUTOR, purpose: "Publish terminal requirement for manual reconciliation.", delivery: at_least_once, dedupe_key: event_id}
  - {id: EVT-ACTION-RECONCILED, producer: CMP-ACTION-EXECUTOR, purpose: "Publish read-only reconciliation evidence for prior uncertainty.", delivery: at_least_once, dedupe_key: event_id}
