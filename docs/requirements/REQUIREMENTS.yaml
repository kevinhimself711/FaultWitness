  - {id: REQ-RAG-004, statement: "Attach source, version, section, chunk, and evidence identifiers to every supported final claim.", mandatory: true, priority: P0, source_ids: [SRC-JD-001, SRC-JD-003, SRC-INT-NK-005, SRC-INT-XHS-002, SRC-UPSTREAM-001], roles: [application, algorithm, product_client], architecture_targets: [experience_plane, data_plane, evaluation_plane], gates: [G04, G07], verification: "Citation correctness and completeness are programmatically scored and manually sampled.", status: accepted}
