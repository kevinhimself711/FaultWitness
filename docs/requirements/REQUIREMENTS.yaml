  - {id: REQ-MEM-001, statement: "Separate runtime state, durable knowledge, and learned memory by owner, storage, lifetime, and read path.", mandatory: true, priority: P0, source_ids: [SRC-JD-001, SRC-JD-003, SRC-INT-NK-010, SRC-INT-XHS-001, SRC-UPSTREAM-001], roles: [application, algorithm, infra], architecture_targets: [control_plane, data_plane], gates: [G04], verification: "Schemas and architecture tests reject cross-store ownership and unbounded transcript reuse.", status: accepted}
