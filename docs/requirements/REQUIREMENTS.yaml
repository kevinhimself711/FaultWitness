  - {id: REQ-TOOL-005, statement: "Expose the same governed capability through internal SDK and MCP-compatible interfaces with equivalent semantics.", mandatory: false, priority: P1, source_ids: [SRC-JD-001, SRC-JD-003, SRC-INT-NK-002, SRC-INT-XHS-004, SRC-UPSTREAM-001], roles: [application, infra], architecture_targets: [control_plane, execution_plane], gates: [G03, G04], verification: "Cross-interface contract tests compare authorization, schema, error, and result behavior.", status: accepted}
  - {id: REQ-SKILL-001, statement: "Package reusable Skills with triggers, anti-triggers, boundaries, steps, resources, failures, and independent Eval cases.", mandatory: false, priority: P1, source_ids: [SRC-JD-001, SRC-JD-003, SRC-INT-NK-010, SRC-INT-XHS-004, SRC-UPSTREAM-001], roles: [application, product_client], architecture_targets: [experience_plane, control_plane, evaluation_plane], gates: [G04], verification: "Skill trigger precision and recall, task success, token overhead, conflicts, and overreach are measured.", status: accepted}
  - {id: REQ-RAG-001, statement: "Ingest documents, code, configuration, and incident records while routing low-quality PDFs to OCR.", mandatory: true, priority: P0, source_ids: [SRC-JD-001, SRC-JD-003, SRC-INT-NK-002, SRC-INT-XHS-002, SRC-UPSTREAM-001], roles: [application, algorithm], architecture_targets: [data_plane], gates: [G04], verification: "Versioned fixtures exercise format routing, quality checks, extraction, quarantine, and provenance.", status: accepted}
