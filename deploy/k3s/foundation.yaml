apiVersion: v1
kind: ResourceQuota
metadata:
  name: faultwitness-budget
  namespace: fw-control
spec:
  hard:
    requests.cpu: "3"
    requests.memory: 5Gi
    limits.cpu: "6"
    limits.memory: 10Gi
---
