apiVersion: batch/v1
kind: Job
metadata:
  name: smoke-runc
  namespace: fw-eval
  labels:
    app.kubernetes.io/part-of: faultwitness
    faultwitness.dev/eval: EVAL-G01-002
  annotations:
    faultwitness.dev/image-digest: sha256:b7f3d86d6e84fc17718c48bcde1450807faa2d56704205c697b4bd5df7b9e29f
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smoke-runc
    spec:
      runtimeClassName: runc
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: compute
          image: docker.io/library/busybox:1.36.1
          imagePullPolicy: Never
          command: [sh, -c, 'printf "FW_KERNEL=%s\n" "$(uname -r)"; test "$(expr 17 \* 19)" = 323 && echo FW_SMOKE_PASS']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
