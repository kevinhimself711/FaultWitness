        faultwitness.dev/network-client: denied
        faultwitness.dev/eval: EVAL-G01-002-network
    spec:
      runtimeClassName: runc
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: probe
          image: docker.io/library/busybox:1.36.1
          imagePullPolicy: Never
          command: [sh, -c, 'if wget -qO- -T 3 http://network-server:8080; then exit 1; else echo FW_DENY_PASS; fi']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
