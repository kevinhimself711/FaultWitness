name: Defect
description: Report a reproducible repository, contract, or implementation defect.
title: "[bug] "
labels: [bug]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior or invariant
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include commands and environment; never include credentials or private traces.
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Revision
      placeholder: Full candidate commit SHA
    validations:
      required: true
