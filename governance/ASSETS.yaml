schema_version: "1.0.0"
assets:
  - path: PROJECT_STATE.yaml
    schema: schemas/governance/project-state.schema.json
  - path: docs/requirements/REQUIREMENTS.yaml
    schema: schemas/governance/requirement-registry.schema.json
  - path: docs/requirements/SOURCE_CATALOG.yaml
    schema: schemas/governance/source-catalog.schema.json
  - path: docs/requirements/EVIDENCE_MATRIX.yaml
    schema: schemas/governance/evidence-matrix.schema.json
  - path: docs/architecture/ARCHITECTURE.yaml
    schema: schemas/governance/architecture.schema.json
  - path: docs/contracts/state-machines/*.yaml
    schema: schemas/contracts/state-machine.schema.json
  - path: docs/contracts/COMMAND_EVENT_CATALOG.yaml
    schema: schemas/contracts/command-event-catalog.schema.json
  - path: docs/contracts/TYPE_CATALOG.yaml
    schema: schemas/contracts/type-catalog.schema.json
  - path: docs/contracts/FAILURE_SEMANTICS.yaml
    schema: schemas/contracts/failure-semantics.schema.json
  - path: docs/contracts/WALKTHROUGH_BINDINGS.yaml
    schema: schemas/contracts/walkthrough-bindings.schema.json
  - path: docs/contracts/openapi.yaml
    schema: schemas/contracts/openapi-design.schema.json
  - path: docs/contracts/asyncapi.yaml
    schema: schemas/contracts/asyncapi-design.schema.json
  - path: docs/claims/CLAIMS.yaml
    schema: schemas/governance/claim-registry.schema.json
  - path: governance/iterations/I-*.yaml
    schema: schemas/governance/iteration.schema.json
  - path: governance/gates/G*.yaml
    schema: schemas/governance/gate.schema.json
  - path: docs/evals/EVAL-G*/manifest.json
    schema: schemas/governance/eval-manifest.schema.json
  - path: docs/evals/EVAL-G00-006/WALKTHROUGHS.yaml
    schema: schemas/governance/gate-walkthroughs.schema.json
  - path: docs/adr/INDEX.yaml
    schema: schemas/governance/adr-registry.schema.json
  - path: config/secrets/schema.yaml
    schema: schemas/bootstrap/secret-config.schema.json
  - path: config/secrets/toolchain.lock.yaml
    schema: schemas/bootstrap/toolchain-lock.schema.json
  - path: docs/evals/EVAL-G01-001/CAPABILITY_BASELINE.json
    schema: schemas/bootstrap/capability-baseline.schema.json
  - path: .github/rulesets/main.json
    schema: schemas/governance/github-ruleset.schema.json
